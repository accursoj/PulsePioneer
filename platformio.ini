; --- New Config---
[env:esp32-s3-devkitc-1]
platform = espressif32
framework = espidf
; Point to custom esp32-s3-devkitc-1 board for 32MB flash and 16MB PSRAM
board_dir = boards
board = esp32-s3-devkitc-1
monitor_speed = 115200

; Still needs to be defined here so PlatformIO can find the file in the project root
; Otherwise, just defining it in esp32-s3-devkitc-1.json will not find the file in the project root
board_build.partitions = partitions_32MB.csv

build_flags =
    -DBOARD_HAS_PSRAM
